", "color": "#9E9E9E", "layer_label": "🧪 Tests", "size": 6, "lines": 27, "imports": ["@prisma", "@prisma"]}, {"id": "types/index.ts", "name": "index", "layer": "model", "color": "#FF9800", "layer_label": "📋 Models", "size": 6, "lines": 55, "imports": []}], "links": [{"source": "app/admin/projects/[id]/page.tsx", "target": "app/admin/projects/ProjectForm.tsx"}, {"source": "app/admin/projects/new/page.tsx", "target": "app/admin/projects/ProjectForm.tsx"}, {"source": "app/admin/projects/page.tsx", "target": "app/admin/projects/DeleteButton.tsx"}, {"source": "app/contact/page.tsx", "target": "app/contact/ContactForm.tsx"}, {"source": "app/projects/page.tsx", "target": "app/projects/ProjectsFilter.tsx"}, {"source": "components/ui/CTASection.tsx", "target": "components/ui/LeadCaptureWidget.tsx"}, {"source": "components/ui/WhyChooseMe.tsx", "target": "components/ui/GradientIcon.tsx"}, {"source": "prisma.config.ts", "target": "lib/prisma.ts"}]};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("svg")
    .attr("viewBox", [0, 0, width, height]);

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
    .scaleExtent([0.2, 5])
    .on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

// Arrow markers
svg.append("defs").selectAll("marker")
    .data(["arrow"])
    .join("marker")
    .attr("id", d => d)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 20)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("fill", "#58a6ff")
    .attr("d", "M0,-5L10,0L0,5");

// Force simulation
const simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => d.size + 4))
    .force("x", d3.forceX(width / 2).strength(0.05))
    .force("y", d3.forceY(height / 2).strength(0.05));

// Group by layer for clustering
const layerCenters = {};
const layers = [...new Set(data.nodes.map(d => d.layer))];
layers.forEach((l, i) => {
    const angle = (2 * Math.PI * i) / layers.length;
    layerCenters[l] = {
        x: width/2 + Math.cos(angle) * 250,
        y: height/2 + Math.sin(angle) * 250,
    };
});
simulation.force("layerX", d3.forceX(d => layerCenters[d.layer]?.x || width/2).strength(0.12));
simulation.force("layerY", d3.forceY(d => layerCenters[d.layer]?.y || height/2).strength(0.12));

// Links
const link = g.append("g")
    .selectAll("line")
    .data(data.links)
    .join("line")
    .attr("class", "link")
    .attr("stroke", "#58a6ff")
    .attr("stroke-width", 1.5)
    .attr("marker-end", "url(#arrow)");

// Node groups
const node = g.append("g")
    .selectAll("g")
    .data(data.nodes)
    .join("g")
    .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

// Glow effect
node.append("circle")
    .attr("r", d => d.size + 4)
    .attr("fill", d => d.color)
    .attr("opacity", 0.15)
    .attr("filter", "blur(4px)");

// Main circle
node.append("circle")
    .attr("r", d => d.size)
    .attr("fill", d => d.color)
    .attr("stroke", d => d.color)
    .attr("stroke-width", 1.5)
    .attr("fill-opacity", 0.7)
    .attr("cursor", "grab")
    .on("mouseover", showTooltip)
    .on("mousemove", moveTooltip)
    .on("mouseout", hideTooltip);

// Labels (only for larger nodes)
node.filter(d => d.size > 12)
    .append("text")
    .attr("class", "node-label")
    .attr("dy", d => d.size + 14)
    .text(d => d.name);

simulation.on("tick", () => {
    link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Drag
function dragstarted(e) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    e.subject.fx = e.subject.x;
    e.subject.fy = e.subject.y;
}
function dragged(e) {
    e.subject.fx = e.x;
    e.subject.fy = e.y;
}
function dragended(e) {
    if (!e.active) simulation.alphaTarget(0);
    e.subject.fx = null;
    e.subject.fy = null;
}

// Tooltip
const tooltip = d3.select("#tooltip");
function showTooltip(e, d) {
    tooltip.style("display", "block");
    tooltip.select(".tt-name").text(d.name);
    tooltip.select(".tt-layer").text(d.layer_label);
    tooltip.select(".tt-info").text(d.lines + " lines  •  " + d.layer);
    const imp = d.imports?.length ? "Imports: " : "";
    tooltip.select(".tt-imports").html(imp + (d.imports || []).map(i => "<span>" + i + "</span>").join(", "));
    
    // Highlight connected
    const connected = new Set();
    data.links.forEach(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        if (sid === d.id) connected.add(tid);
        if (tid === d.id) connected.add(sid);
    });
    node.selectAll("circle:nth-child(2)")
        .attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.15);
    link.attr("stroke-opacity", l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return sid === d.id || tid === d.id ? 0.8 : 0.05;
    });
}
function moveTooltip(e) {
    tooltip.style("left", (e.clientX + 16) + "px").style("top", (e.clientY - 20) + "px");
}
function hideTooltip() {
    tooltip.style("display", "none");
    node.selectAll("circle:nth-child(2)").attr("opacity", 0.7);
    link.attr("stroke-opacity", 0.4);
}

// Initial zoom to fit
setTimeout(() => {
    svg.transition().duration(800).call(
        zoom.transform,
        d3.zoomIdentity.translate(width*0.1, height*0.1).scale(0.8)
    );
}, 1500);
</script>
