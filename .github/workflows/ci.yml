name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install ruff pytest

      - name: Lint with ruff
        run: |
          ruff check src/ --select E,F,W --ignore E501
          echo "✅ Lint passed"

      - name: Check imports
        run: |
          python -c "from obsidian_bridge.parser import parse_note; print('✅ parser OK')"
          python -c "from obsidian_bridge.indexer import VaultIndexer; print('✅ indexer OK')"
          python -c "from obsidian_bridge.cli import cli; print('✅ cli OK')"
          python -c "from obsidian_bridge.watcher import VaultWatcher; print('✅ watcher OK')"
          python -c "from obsidian_bridge.models import Note, Chunk; print('✅ models OK')"
          python -c "from obsidian_bridge.config import Settings; print('✅ config OK')"

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls tests/*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            pytest tests/ -v
          else
            echo "⚠️ No tests found, skipping"
          fi

      - name: Verify CLI help
        run: |
          python -m obsidian_bridge.cli --help
          echo "✅ CLI help works"
